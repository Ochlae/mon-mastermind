<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mastermind - Claudius Art Studio</title>

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <style>

    :root {
      --fond: #140f0a;
      --carte: rgba(255, 248, 230, 0.09);
      --texte: #fff4d8;
      --or: #d8a331;
      --rouge: #b9372b;
      --ombre: rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--texte);

      background:
        radial-gradient(circle at top left, #7b2e1f 0, transparent 28%),
        radial-gradient(circle at bottom right, #1f4a5a 0, transparent 35%),
        linear-gradient(135deg, #120b08, #24170d 48%, #0b1116);

      display: flex;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 760px;

      background: rgba(0,0,0,0.28);

      border: 1px solid rgba(255,255,255,0.12);

      border-radius: 28px;

      box-shadow: 0 22px 60px var(--ombre);

      overflow: hidden;
    }

    header {
      padding: 26px 20px 18px;

      text-align: center;

      border-bottom: 1px solid rgba(255,255,255,0.12);

      background:
      linear-gradient(
      90deg,
      rgba(216,163,49,0.15),
      rgba(185,55,43,0.12));
    }

    .logo {
      width: 180px;
      display: block;
      margin: 0 auto 12px;
    }

    h1 {
      margin: 0;

      color: var(--or);

      font-size: clamp(28px, 8vw, 46px);

      letter-spacing: 1px;

      text-shadow: 2px 3px 0 #000;
    }

    .subtitle {
      margin: 8px 0 0;

      font-size: 15px;

      opacity: 0.9;
    }

    main {
      padding: 18px;
    }

    .topbar {
      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 12px;

      margin-bottom: 16px;
    }

    .info,
    .rules {
      background: var(--carte);

      border: 1px solid rgba(255,255,255,0.12);

      border-radius: 18px;

      padding: 14px;

      line-height: 1.45;
    }

    .info strong {
      color: var(--or);
    }

    .board {
      display: flex;

      flex-direction: column;

      gap: 8px;

      margin: 16px 0;
    }

    .row {
      display: grid;

      grid-template-columns: 1fr auto;

      gap: 10px;

      align-items: center;

      background: rgba(255,255,255,0.07);

      border: 1px solid rgba(255,255,255,0.10);

      border-radius: 18px;

      padding: 10px;
    }

    .guess {
      display: flex;

      gap: 8px;

      flex-wrap: wrap;
    }

    .peg,
    .choice,
    .mini {

      border-radius: 50%;

      border: 3px solid rgba(255,255,255,0.35);

      box-shadow:
      inset -4px -5px 8px rgba(0,0,0,0.28),
      inset 3px 3px 6px rgba(255,255,255,0.25);
    }

    .peg {
      width: 42px;
      height: 42px;

      background: rgba(255,255,255,0.14);
    }

    .choice {
      width: 44px;
      height: 44px;

      cursor: pointer;

      transition: transform 0.15s, outline 0.15s;
    }

    .choice:hover {
      transform: translateY(-3px) scale(1.05);

      outline: 3px solid var(--or);
    }

    .feedback {
      width: 78px;

      display: grid;

      grid-template-columns: repeat(2, 1fr);

      gap: 5px;
    }

    .mini {
      width: 18px;
      height: 18px;

      background: rgba(255,255,255,0.18);

      border-width: 1px;
    }

    .controls {
      background: rgba(0,0,0,0.24);

      border: 1px solid rgba(255,255,255,0.12);

      border-radius: 22px;

      padding: 16px;

      margin-top: 18px;
    }

    .palette {
      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      justify-content: center;

      margin-bottom: 15px;
    }

    .current {
      display: flex;

      gap: 8px;

      justify-content: center;

      margin-bottom: 15px;
    }

    button {
      border: none;

      border-radius: 16px;

      padding: 13px 16px;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      color: #211507;

      background:
      linear-gradient(
      135deg,
      #ffd56d,
      #c98d20);

      box-shadow: 0 8px 18px rgba(0,0,0,0.32);
    }

    .buttons {
      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 10px;
    }

    .secondary {
      background:
      linear-gradient(
      135deg,
      #f3e6c5,
      #b4a17e);
    }

    .message {
      text-align: center;

      min-height: 28px;

      color: #ffe39a;

      font-weight: bold;

      margin-top: 12px;
    }

    .secret {
      display: none;

      justify-content: center;

      gap: 8px;

      margin-top: 12px;
    }

    .signature {
      text-align: center;

      font-size: 13px;

      opacity: 0.75;

      padding: 0 18px 18px;
    }

    .rouge { background: #c0392b; }
    .bleu { background: #2874a6; }
    .jaune { background: #f4d03f; }
    .vert { background: #229954; }
    .violet { background: #7d3c98; }
    .orange { background: #e67e22; }

    .noir { background: #050505; }

    .blanc { background: #f7f0dd; }

    @media (max-width: 650px) {

      body {
        padding: 8px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      main {
        padding: 12px;
      }

      .peg {
        width: 36px;
        height: 36px;
      }

      .choice {
        width: 40px;
        height: 40px;
      }

      .row {
        grid-template-columns: 1fr 68px;
      }

      .feedback {
        width: 62px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .logo {
        width: 140px;
      }
    }

  </style>
</head>

<body>

  <div class="app">

    <header>

      <img src="logo.png" class="logo">

      <h1>Mastermind</h1>

      <p class="subtitle">
        Édition Claudius Art Studio — logique, couleurs et mystère
      </p>

    </header>

    <main>

      <section class="topbar">

        <div class="info">
          <strong>But du jeu :</strong><br>
          Retrouver la combinaison secrète de 4 couleurs
          en 10 essais maximum.
        </div>

        <div class="rules">
          ⚫ Noir : bonne couleur au bon endroit.<br>
          ⚪ Blanc : bonne couleur mal placée.
        </div>

      </section>

      <div class="board" id="board"></div>

      <section class="controls">

        <div class="palette" id="palette"></div>

        <div class="current" id="current"></div>

        <div class="buttons">

          <button onclick="validateGuess()">
            Valider l’essai
          </button>

          <button class="secondary" onclick="clearCurrent()">
            Effacer
          </button>

          <button class="secondary" onclick="newGame()">
            Nouvelle partie
          </button>

          <button class="secondary" onclick="showSecret()">
            Voir la solution
          </button>

        </div>

        <div class="message" id="message"></div>

        <div class="secret" id="secret"></div>

      </section>

    </main>

    <div class="signature">
      © Claudius Art Studio — jeu personnel
    </div>

  </div>

</body>
</html>
